name: testsprint_junior
description: TestSprint Junior — student test series app (Flutter)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.4
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  file_picker: ^8.1.4
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^10.1.2
  screen_protector: ^1.4.2
  safe_device: ^1.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
